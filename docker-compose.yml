services:
  postgres:
    image: postgres:16-alpine
    container_name: puryfi-chaster-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-puryfi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-puryfi}
      POSTGRES_DB: ${POSTGRES_DB:-puryfi_chaster}
    ports:
      # Exposed on host so the server (running locally, outside Docker) can connect
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-puryfi} -d ${POSTGRES_DB:-puryfi_chaster}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
    container_name: puryfi-chaster-front
    restart: unless-stopped
    ports:
      - "5173:80"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: puryfi-chaster-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CHASTER_DEVELOPER_TOKEN=${CHASTER_DEVELOPER_TOKEN}
      - CHASTER_WEBHOOK_USER=${CHASTER_WEBHOOK_USER}
      - CHASTER_WEBHOOK_PWD=${CHASTER_WEBHOOK_PWD}
      - DATABASE_URL=${DATABASE_URL}

volumes:
  postgres_data:
